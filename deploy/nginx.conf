server {
    listen 80;
    server_name example.com www.example.com;  # 改为你的域名

    # 开启 gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
    gzip_min_length 1024;

    # 上传文件大小限制
    client_max_body_size 10M;

    # ── 静态文件（直接由 Nginx 服务，不走 FastAPI）──────────
    location /css/ {
        alias /app/frontend/public/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /js/ {
        alias /app/frontend/public/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location /img/ {
        alias /app/frontend/public/img/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /pages/ {
        alias /app/frontend/pages/;
        try_files $uri $uri/ /pages/index.html;
    }

    # ── API 反代到 FastAPI ─────────────────────────────────
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /docs {
        proxy_pass http://backend:8000/docs;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
    }

    # ── 根路径重定向到首页 ─────────────────────────────────
    location = / {
        return 301 /pages/index.html;
    }
}
