<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>文章管理 - TechBlog</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <div class="admin-content">
    <div class="admin-topbar">
      <h2>📝 文章管理</h2>
      <a href="editor.html" class="btn btn-primary btn-sm">✏️ 写文章</a>
    </div>
    <div class="admin-main">
      <!-- 搜索过滤 -->
      <div style="display:flex;gap:10px;margin-bottom:16px">
        <input class="form-control" id="searchQ" placeholder="搜索标题..." style="max-width:220px"
          oninput="debounceLoad()">
        <select class="form-control" id="filterStatus" style="max-width:120px" onchange="loadPosts()">
          <option value="">全部状态</option>
          <option value="1">已发布</option>
          <option value="0">草稿</option>
        </select>
      </div>

      <table class="admin-table" id="postsTable">
        <thead>
          <tr><th>标题</th><th>分类</th><th>标签</th><th>状态</th><th>阅读</th><th>时间</th><th>操作</th></tr>
        </thead>
        <tbody><tr><td colspan="7" style="text-align:center;padding:20px;color:var(--text-muted)">加载中...</td></tr></tbody>
      </table>

      <div id="pagination" class="pagination" style="margin-top:16px"></div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/admin.js"></script>
<script>
  requireLogin();
  renderAdminSidebar('posts');

  let currentPage = 1;
  let debounceTimer;

  function debounceLoad() { clearTimeout(debounceTimer); debounceTimer = setTimeout(loadPosts, 400); }

  async function loadPosts(page = 1) {
    currentPage = page;
    const q = document.getElementById('searchQ').value.trim();
    const status = document.getElementById('filterStatus').value;
    try {
      const params = { page, page_size: 15 };
      if (q) params.q = q;
      const data = await api.get('/posts', params);
      let items = data.items;
      if (status === '1') items = items.filter(p => p.is_published);
      if (status === '0') items = items.filter(p => !p.is_published);

      const tbody = document.querySelector('#postsTable tbody');
      tbody.innerHTML = items.length ? items.map(p => `
        <tr>
          <td>
            ${p.is_top ? '<span class="badge badge-danger">置顶</span> ' : ''}
            <a href="/pages/post.html?slug=${p.slug}" target="_blank" style="color:var(--text)">${p.title}</a>
          </td>
          <td>${p.category?.name || '-'}</td>
          <td>${(p.tags||[]).map(t => `<span class="badge badge-secondary">${t.name}</span>`).join(' ')}</td>
          <td><span class="badge ${p.is_published ? 'badge-success' : 'badge-secondary'}">${p.is_published ? '已发布' : '草稿'}</span></td>
          <td>${p.views}</td>
          <td>${formatDate(p.created_at)}</td>
          <td class="actions">
            <a href="editor.html?slug=${p.slug}" class="btn btn-sm btn-outline">编辑</a>
            <button class="btn btn-sm btn-danger" onclick="deletePost('${p.slug}', '${p.title}')">删除</button>
          </td>
        </tr>`).join('')
        : '<tr><td colspan="7" style="text-align:center;color:var(--text-muted);padding:30px">暂无文章</td></tr>';

      renderPagination(document.getElementById('pagination'), data.pagination, 'loadPosts');
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function deletePost(slug, title) {
    if (!confirm(`确认删除文章「${title}」？此操作不可撤销。`)) return;
    try {
      await api.delete(`/posts/${slug}`);
      showToast('删除成功', 'success');
      loadPosts(currentPage);
    } catch (e) { showToast(e.message, 'error'); }
  }

  window.loadPosts = loadPosts;
  window.deletePost = deletePost;
  window.debounceLoad = debounceLoad;
  loadPosts();
</script>
</body>
</html>
