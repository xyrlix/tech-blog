<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>博客设置 - 后台管理</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
  <style>
    .settings-section { margin-bottom: 32px; }
    .settings-section h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .form-hint { font-size: .8rem; color: var(--text-muted); margin-top: 4px; }
    @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>

<div class="admin-layout">
  <!-- 侧边栏 -->
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <!-- 主内容 -->
  <div class="admin-main">
    <div class="admin-header">
      <h2>⚙️ 博客设置</h2>
    </div>

    <div class="admin-content">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px">

        <!-- 左列：博客信息 -->
        <div class="card">
          <div class="card-body">
            <div class="settings-section">
              <h3>📝 博客信息</h3>
              <div class="form-group">
                <label>博客标题 *</label>
                <input type="text" id="blogTitle" placeholder="我的技术博客">
              </div>
              <div class="form-group">
                <label>副标题</label>
                <input type="text" id="blogSubtitle" placeholder="记录技术与思考">
              </div>
              <div class="form-group">
                <label>作者名</label>
                <input type="text" id="blogAuthor" placeholder="Admin">
              </div>
              <div class="form-group">
                <label>页脚版权</label>
                <input type="text" id="blogFooter" placeholder="© 2025 My Blog">
                <div class="form-hint">显示在页面底部</div>
              </div>
              <div class="form-group">
                <label>GitHub 链接</label>
                <input type="url" id="blogGithub" placeholder="https://github.com/yourname">
              </div>
              <div class="form-group">
                <label>ICP 备案号</label>
                <input type="text" id="blogIcp" placeholder="京ICP备XXXXXXXX号">
                <div class="form-hint">不需要可留空</div>
              </div>
              <button class="btn btn-primary" onclick="saveBlogSettings()">💾 保存博客设置</button>
            </div>
          </div>
        </div>

        <!-- 右列：账号安全 + 个人信息 -->
        <div style="display:flex;flex-direction:column;gap:24px">
          <div class="card">
            <div class="card-body">
              <div class="settings-section" style="margin-bottom:0">
                <h3>👤 个人信息</h3>
                <div class="form-group">
                  <label>用户名</label>
                  <input type="text" id="profileUsername" disabled style="opacity:.6">
                  <div class="form-hint">用户名暂不支持修改</div>
                </div>
                <div class="form-group">
                  <label>邮箱</label>
                  <input type="email" id="profileEmail" placeholder="admin@example.com">
                </div>
                <div class="form-group">
                  <label>个人简介</label>
                  <textarea id="profileBio" rows="3" placeholder="写点什么介绍自己..."></textarea>
                </div>
                <button class="btn btn-outline" onclick="saveProfile()">保存个人信息</button>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="card-body">
              <div class="settings-section" style="margin-bottom:0">
                <h3>🔒 修改密码</h3>
                <div class="form-group">
                  <label>当前密码</label>
                  <input type="password" id="oldPassword" placeholder="输入当前密码">
                </div>
                <div class="form-group">
                  <label>新密码</label>
                  <input type="password" id="newPassword" placeholder="至少6位">
                </div>
                <div class="form-group">
                  <label>确认新密码</label>
                  <input type="password" id="confirmPassword" placeholder="再次输入新密码">
                </div>
                <button class="btn btn-danger" onclick="changePassword()">🔑 确认修改密码</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/admin.js"></script>
<script>
  // 加载设置
  async function loadSettings() {
    try {
      const s = await api.get('/settings');
      document.getElementById('blogTitle').value = s.title || '';
      document.getElementById('blogSubtitle').value = s.subtitle || '';
      document.getElementById('blogAuthor').value = s.author || '';
      document.getElementById('blogFooter').value = s.footer || '';
      document.getElementById('blogGithub').value = s.github || '';
      document.getElementById('blogIcp').value = s.icp || '';
    } catch(e) { showToast('加载设置失败: ' + e.message, 'error'); }
  }

  // 加载用户信息
  async function loadProfile() {
    try {
      const user = await api.get('/auth/me');
      document.getElementById('profileUsername').value = user.username || '';
      document.getElementById('profileEmail').value = user.email || '';
      document.getElementById('profileBio').value = user.bio || '';
    } catch(e) {}
  }

  // 保存博客设置
  async function saveBlogSettings() {
    try {
      await api.put('/settings', {
        title: document.getElementById('blogTitle').value.trim(),
        subtitle: document.getElementById('blogSubtitle').value.trim(),
        author: document.getElementById('blogAuthor').value.trim(),
        footer: document.getElementById('blogFooter').value.trim(),
        github: document.getElementById('blogGithub').value.trim(),
        icp: document.getElementById('blogIcp').value.trim(),
      });
      showToast('博客设置已保存', 'success');
    } catch(e) { showToast(e.message, 'error'); }
  }

  // 保存个人信息
  async function saveProfile() {
    try {
      await api.put('/auth/me', {
        email: document.getElementById('profileEmail').value.trim(),
        bio: document.getElementById('profileBio').value.trim(),
      });
      showToast('个人信息已保存', 'success');
    } catch(e) { showToast(e.message, 'error'); }
  }

  // 修改密码
  async function changePassword() {
    const oldPwd = document.getElementById('oldPassword').value;
    const newPwd = document.getElementById('newPassword').value;
    const confirmPwd = document.getElementById('confirmPassword').value;
    if (!oldPwd || !newPwd) return showToast('请填写完整', 'error');
    if (newPwd !== confirmPwd) return showToast('两次密码不一致', 'error');
    if (newPwd.length < 6) return showToast('新密码至少6位', 'error');
    try {
      await api.put('/settings/password', { old_password: oldPwd, new_password: newPwd });
      showToast('密码修改成功，请重新登录', 'success');
      document.getElementById('oldPassword').value = '';
      document.getElementById('newPassword').value = '';
      document.getElementById('confirmPassword').value = '';
      setTimeout(() => Auth.logout(), 1500);
    } catch(e) { showToast(e.message, 'error'); }
  }

  window.saveBlogSettings = saveBlogSettings;
  window.saveProfile = saveProfile;
  window.changePassword = changePassword;

  requireLogin();
  renderAdminSidebar('settings');
  loadSettings();
  loadProfile();
</script>
</body>
</html>
