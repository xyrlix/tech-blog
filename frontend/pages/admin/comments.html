<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>评论管理 - TechBlog</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar"></aside>

  <div class="admin-content">
    <div class="admin-topbar"><h2>💬 评论管理</h2></div>
    <div class="admin-main">
      <div class="card">
        <div class="card-body">
          <p style="color:var(--text-muted);font-size:.9rem;margin-bottom:16px">新评论默认待审核，通过后才对访客可见。</p>
          <table class="admin-table" id="commentTable">
            <thead><tr><th>文章</th><th>昵称</th><th>内容</th><th>时间</th><th>状态</th><th>操作</th></tr></thead>
            <tbody><tr><td colspan="6" style="text-align:center;padding:20px;color:var(--text-muted)">加载中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/admin.js"></script>
<script>
  requireLogin();
  renderAdminSidebar('comments');

  async function loadComments() {
    try {
      const data = await api.get('/comments', { page: 1, page_size: 100 });
      const comments = data.items || [];
      document.querySelector('#commentTable tbody').innerHTML = comments.length
        ? comments.map(c => `
          <tr>
            <td><a href="/pages/post.html?slug=${c.post_slug}" target="_blank" style="color:var(--text);max-width:120px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${c.post_title}">${c.post_title || '-'}</a></td>
            <td>${c.nickname}</td>
            <td style="max-width:260px;word-break:break-all">${c.content}</td>
            <td style="white-space:nowrap">${formatDate(c.created_at)}</td>
            <td>${c.is_approved
              ? '<span style="color:#3fb950;font-size:.82rem">✓ 已通过</span>'
              : '<span style="color:#f0883e;font-size:.82rem">⏳ 待审核</span>'}</td>
            <td style="white-space:nowrap">
              ${c.is_approved
                ? `<button class="btn btn-sm btn-outline" onclick="approveComment(${c.id}, false)" style="margin-right:4px">驳回</button>`
                : `<button class="btn btn-sm btn-primary" onclick="approveComment(${c.id}, true)" style="margin-right:4px">通过</button>`}
              <button class="btn btn-sm btn-danger" onclick="deleteComment(${c.id})">删除</button>
            </td>
          </tr>`).join('')
        : '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:30px">暂无评论</td></tr>';
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function approveComment(id, approved) {
    try {
      await api.put(`/comments/${id}/approve?approved=${approved}`);
      showToast(approved ? '已通过' : '已驳回', 'success');
      loadComments();
    } catch (e) { showToast(e.message, 'error'); }
  }

  async function deleteComment(id) {
    if (!confirm('确认删除此评论？')) return;
    try { await api.delete(`/comments/${id}`); showToast('已删除', 'success'); loadComments(); }
    catch (e) { showToast(e.message, 'error'); }
  }

  window.approveComment = approveComment;
  window.deleteComment = deleteComment;
  loadComments();
</script>
</body>
</html>
