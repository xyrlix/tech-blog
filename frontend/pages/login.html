<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 - TechBlog</title>
  <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="title">🔐 <span>TechBlog</span> 后台登录</div>
    <div class="form-group">
      <label>用户名</label>
      <input class="form-control" type="text" id="username" placeholder="请输入用户名" autofocus>
    </div>
    <div class="form-group">
      <label>密码</label>
      <input class="form-control" type="password" id="password" placeholder="请输入密码">
    </div>
    <div style="margin-top:8px">
      <button class="btn btn-primary" style="width:100%" id="loginBtn" onclick="doLogin()">登 录</button>
    </div>
    <p style="text-align:center;margin-top:16px;font-size:.85rem">
      <a href="/pages/index.html">← 返回博客首页</a>
    </p>
  </div>
</div>

<script src="/js/app.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = '/pages/admin/dashboard.html';

  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    if (!username || !password) return showToast('请填写用户名和密码', 'error');

    const btn = document.getElementById('loginBtn');
    btn.disabled = true;
    btn.textContent = '登录中...';

    try {
      const data = await api.post('/auth/login', { username, password });
      Auth.setToken(data.access_token);
      Auth.setUser(data.user);
      showToast('登录成功', 'success');
      setTimeout(() => window.location.href = '/pages/admin/dashboard.html', 800);
    } catch (e) {
      showToast(e.message, 'error');
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  }

  window.doLogin = doLogin;
</script>
</body>
</html>
